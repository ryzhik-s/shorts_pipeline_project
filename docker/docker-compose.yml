x-app-env: &app-env
  ENVIRONMENT: ${ENVIRONMENT:-local}
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/shorts_pipeline
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  LLM_PROVIDER: ${LLM_PROVIDER:-fake}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  TTS_PROVIDER: ${TTS_PROVIDER:-edge}
  STORAGE_BACKEND: local
  STORAGE_LOCAL_ROOT: /data/storage
  SENTRY_DSN: ${SENTRY_DSN:-}
  LOG_JSON: ${LOG_JSON:-true}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shorts_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    environment: *app-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    environment: *app-env
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    environment: *app-env
    volumes:
      - storage_data:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: worker
    environment: *app-env
    # Flower — веб-UI для мониторинга очереди Celery: задачи в очереди,
    # активные/завершённые/проваленные, throughput воркеров в реальном времени.
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_app",
        "flower",
        "--port=5555",
      ]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg_data:
  storage_data:
  prometheus_data:
  grafana_data:
